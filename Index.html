<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barbacoa de la Casa Vieja</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: #0d0a07;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,100,20,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(120,50,10,0.2) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      width: clamp(110px, 28vw, 160px);
      height: clamp(110px, 28vw, 160px);
    }
    .logo-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #c8860a, #f5c842, #c8860a, #8b5e0a, #c8860a);
      animation: spin 8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #0d0a07;
      background: #1a1208;
    }
    .logo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Title */
    .title-block { text-align: center; }
    .title-block h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #f5c842;
      line-height: 1.2;
      text-shadow: 0 0 30px rgba(245,200,66,0.4);
      letter-spacing: 0.02em;
    }
    .title-block p {
      margin-top: 0.4rem;
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: #a07840;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c8860a55, #f5c84288, #c8860a55, transparent);
    }

    /* Buttons */
    .btn-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.9rem, 2.8vw, 1.05rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.06);
      opacity: 0;
      transition: opacity 0.18s;
    }
    .btn:hover::after { opacity: 1; }
    .btn:hover { transform: translateY(-3px) scale(1.015); }
    .btn:active { transform: translateY(0) scale(0.98); }

    /* Primary gold */
    .btn-gold {
      background: linear-gradient(135deg, #c8860a 0%, #f5c842 50%, #c8860a 100%);
      background-size: 200% 200%;
      color: #1a0e00;
      box-shadow: 0 4px 20px rgba(200,134,10,0.35);
      animation: shimmer 4s ease infinite;
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .btn-gold:hover { box-shadow: 0 8px 32px rgba(245,200,66,0.55); }

    /* Outline amber */
    .btn-outline {
      background: rgba(200,134,10,0.08);
      color: #f5c842;
      border: 1.5px solid rgba(200,134,10,0.5);
      box-shadow: 0 2px 12px rgba(200,134,10,0.1);
    }
    .btn-outline:hover {
      background: rgba(200,134,10,0.18);
      border-color: #f5c842;
      box-shadow: 0 6px 24px rgba(245,200,66,0.25);
    }

    /* Spotify green */
    .btn-spotify {
      background: linear-gradient(135deg, #158a3e 0%, #1DB954 50%, #158a3e 100%);
      background-size: 200% 200%;
      color: #fff;
      box-shadow: 0 4px 20px rgba(29,185,84,0.3);
      animation: shimmer-green 4s ease infinite;
    }
    @keyframes shimmer-green {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .btn-spotify:hover { box-shadow: 0 8px 32px rgba(29,185,84,0.5); }

    .btn-icon { font-size: 1.2em; flex-shrink: 0; }

    /* Footer */
    .footer {
      font-size: 0.72rem;
      color: #4a3820;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: linear-gradient(160deg, #1a1208 0%, #0f0b06 100%);
      border: 1px solid rgba(200,134,10,0.35);
      border-radius: 22px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(200,134,10,0.1);
      position: relative;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .modal-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: rgba(200,134,10,0.15);
      border: 1px solid rgba(200,134,10,0.3);
      color: #f5c842;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .modal-close:hover { background: rgba(200,134,10,0.3); }

    .modal-header { text-align: center; margin-bottom: 1.5rem; }
    .modal-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      color: #f5c842;
      font-size: 1.3rem;
      margin-bottom: 0.3rem;
    }
    .modal-header p { color: #a07840; font-size: 0.82rem; }

    .modal-btns { display: flex; flex-direction: column; gap: 0.75rem; }

    .modal-btn {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.15s, box-shadow 0.15s;
      background: linear-gradient(135deg, #158a3e, #1DB954);
      color: #fff;
      box-shadow: 0 3px 14px rgba(29,185,84,0.25);
    }
    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(29,185,84,0.45);
    }
    .modal-btn-icon { font-size: 1.4rem; }
    .modal-btn-text { display: flex; flex-direction: column; }
    .modal-btn-label { font-size: 0.78rem; opacity: 0.8; font-weight: 400; }
    .modal-btn-name { font-size: 1rem; }

    /* Tablet / Desktop tweaks */
    @media (min-width: 640px) {
      .container { max-width: 520px; }
      .btn { padding: 1.1rem 2rem; }
    }
    @media (min-width: 1024px) {
      .container { max-width: 560px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-inner">
      <img src="https://i.ibb.co/jkWp21kD/IMG-4398.jpg" alt="Logo Barbacoa de la Casa Vieja" />
    </div>
  </div>

  <!-- Title -->
  <div class="title-block">
    <h1>Barbacoa de la<br>Casa Vieja</h1>
    <p>✦ Tradición en cada bocado ✦</p>
  </div>

  <div class="divider"></div>

  <!-- Buttons -->
  <div class="btn-group">

    <a href="https://Barbacoa-La-Casa-Vieja.github.io/Men-" target="_blank" class="btn btn-gold">
      <span class="btn-icon">🍽️</span> Menú
    </a>

    <a href="https://tally.so/r/yPDV1x" target="_blank" class="btn btn-outline">
      <span class="btn-icon">⭐</span> Califícanos
    </a>

    <a href="https://tally.so/r/5B2WVE" target="_blank" class="btn btn-outline">
      <span class="btn-icon">👨‍🍳</span> Califica a tu mesero
    </a>

    <button class="btn btn-spotify" onclick="openModal()">
      <span class="btn-icon">🎵</span> Nuestras listas de reproducción Spotify
    </button>

  </div>

  <div class="divider"></div>
  <p class="footer">© 2026 Barbacoa de la Casa Vieja</p>
</div>

<!-- Spotify Modal -->
<div class="modal-overlay" id="spotifyModal" onclick="closeOnOverlay(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div class="modal-icon">🎶</div>
      <h2>Nuestras Playlists</h2>
      <p>Elige el ambiente perfecto para tu visita</p>
    </div>
    <div class="modal-btns">
      <a href="https://open.spotify.com/playlist/3H1RUHkF9ZYRVuBELbVIcE?si=QI3nHnm9RQi-Q79Gew6zPw&pi=TmERreIZSSe3e" target="_blank" class="modal-btn">
        <span class="modal-btn-icon">🎸</span>
        <span class="modal-btn-text">
          <span class="modal-btn-label">Lista 1</span>
          <span class="modal-btn-name">Playlist Casa Vieja Vol. 1</span>
        </span>
      </a>
      <a href="https://open.spotify.com/playlist/3bkERjsiZIIOGH1NerBhb4?si=OlPoxRK7Tcq7JXXN4nebYQ&pi=q4iRgAlcQhihE" target="_blank" class="modal-btn">
        <span class="modal-btn-icon">🎺</span>
        <span class="modal-btn-text">
          <span class="modal-btn-label">Lista 2</span>
          <span class="modal-btn-name">Playlist Casa Vieja Vol. 2</span>
        </span>
      </a>
    </div>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('spotifyModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeModal() {
    document.getElementById('spotifyModal').classList.remove('active');
    document.body.style.overflow = '';
  }
  function closeOnOverlay(e) {
    if (e.target === document.getElementById('spotifyModal')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

</body>
</html>
